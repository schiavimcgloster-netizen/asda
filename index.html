<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Limpa Feirão 2026 | Consulta Oficial</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;700&family=Syncopate:wght@700&display=swap');
        
        :root {
            --hot-pink: #ff007f;
            --soft-pink: #ff66b2;
            --action-green: #22c55e;
            --dark-green: #16a34a;
            --snow-white: #ffffff;
            --carbon: #0a0005;
            --panel: #1a000d;
            --grid-line: rgba(255, 0, 127, 0.08);
        }

        body {
            font-family: 'Space Grotesk', sans-serif;
            background-color: var(--carbon);
            color: var(--snow-white);
            overflow-x: hidden;
            margin: 0;
        }

        .font-syncopate {
            font-family: 'Syncopate', sans-serif;
        }

        /* Grelha Tecnológica */
        .tech-bg {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: 
                linear-gradient(var(--grid-line) 1px, transparent 1px),
                linear-gradient(90deg, var(--grid-line) 1px, transparent 1px);
            background-size: 40px 40px;
            z-index: -1;
        }

        .tech-bg::after {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 50% 50%, transparent 0%, var(--carbon) 90%);
        }

        /* Cartão Central */
        .industrial-card {
            background: linear-gradient(145deg, #2a0015, #0a0005);
            border: 1px solid rgba(255, 0, 127, 0.3);
            border-left: 6px solid var(--hot-pink);
            position: relative;
            box-shadow: 0 50px 100px -20px rgba(0, 0, 0, 1);
        }

        /* Botão Verde */
        .btn-action {
            background: linear-gradient(135deg, var(--action-green) 0%, var(--dark-green) 100%);
            color: var(--snow-white);
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            border-radius: 4px;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .btn-action:hover {
            box-shadow: 0 0 30px rgba(34, 197, 94, 0.6);
            transform: translateY(-2px);
            filter: brightness(1.1);
        }
    </style>
</head>
<body class="min-h-screen flex flex-col antialiased">

    <div class="tech-bg"></div>

    <!-- Cabeçalho Simples -->
    <header class="p-6 flex justify-center items-center w-full relative z-10">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 border border-pink-500/40 flex items-center justify-center rounded bg-pink-500/10">
                <svg class="w-6 h-6 text-pink-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z" />
                </svg>
            </div>
            <h2 class="font-syncopate font-bold text-lg tracking-tight text-white uppercase">LIMPA <span class="text-pink-500">FEIRÃO</span> 2026</h2>
        </div>
    </header>

    <!-- Conteúdo Principal -->
    <main class="flex-grow flex items-center justify-center p-4">
        <div class="max-w-md w-full">
            <div class="industrial-card p-10 relative rounded-lg">
                
                <div class="text-center mb-8">
                    <div class="inline-block px-3 py-1 rounded-full bg-pink-500/10 border border-pink-500/20 mb-4">
                        <span class="text-[10px] font-bold text-pink-400 uppercase tracking-widest">Acesso Autorizado</span>
                    </div>
                    <h1 class="text-2xl font-syncopate font-bold text-white mb-2 uppercase">CONSULTA DE CPF</h1>
                    <p class="text-pink-100/50 text-xs uppercase tracking-widest">Verifique ofertas e descontos ativos</p>
                </div>

                <div class="relative z-10 w-full text-center">
                    <a href="http://o-iiniciolimpafeirao.shop/inicio/" 
                       class="btn-action w-full py-6 block no-underline text-xl text-center shadow-xl uppercase">
                        CONSULTAR AGORA
                    </a>
                </div>

                <div class="mt-8 pt-6 border-t border-white/5 flex flex-col items-center gap-4">
                    <div class="flex gap-4">
                        <div class="flex items-center gap-2">
                            <div class="w-2 h-2 rounded-full bg-green-500"></div>
                            <span class="text-[8px] font-bold text-white/40 uppercase">Sistema Seguro</span>
                        </div>
                        <div class="flex items-center gap-2">
                            <div class="w-2 h-2 rounded-full bg-pink-500"></div>
                            <span class="text-[8px] font-bold text-white/40 uppercase">Base 2026</span>
                        </div>
                    </div>
                </div>

            </div>
        </div>
    </main>

    <!-- Rodapé -->
    <footer class="p-6 text-center opacity-30">
        <p class="text-[8px] font-bold uppercase tracking-[0.3em]">Portal Oficial de Negociação</p>
    </footer>

</body>
</html>
